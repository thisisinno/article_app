services:
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: insight, POSTGRES_USER: insight, POSTGRES_PASSWORD: insight}
    ports: ["5432:5432"]
    volumes: [insight_pg:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes: {insight_pg: {}}
